name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install wails3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install Task
        run: go install github.com/go-task/task/v3/cmd/task@latest

      - name: Build
        run: task darwin:build PRODUCTION=true ARCH=${{ matrix.arch }}

      - name: Create .app bundle
        run: task darwin:create:app:bundle

      - name: Zip .app bundle
        run: cd bin && zip -r WindowResizer-macos-${{ matrix.arch }}.zip WindowResizer.app

      - uses: actions/upload-artifact@v4
        with:
          name: WindowResizer-macos-${{ matrix.arch }}
          path: bin/WindowResizer-macos-${{ matrix.arch }}.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install wails3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install Task
        run: go install github.com/go-task/task/v3/cmd/task@latest

      - name: Build
        run: task windows:build PRODUCTION=true

      - name: Zip executable
        run: Compress-Archive -Path bin/WindowResizer.exe -DestinationPath bin/WindowResizer-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: WindowResizer-windows-amd64
          path: bin/WindowResizer-windows-amd64.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.zip
