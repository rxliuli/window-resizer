name: Release

on:
  push:
    branches: [main]
    paths:
      - 'frontend/package.json'

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: rxliuli/version-check@v1
        id: version
        with:
          file: ./frontend/package.json

  build-macos:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: macos-latest
    environment: release-macOS
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install wails3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install Task
        run: go install github.com/go-task/task/v3/cmd/task@latest

      - name: Setup certificates
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_DEVELOPERID_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_DEVELOPERID_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          security create-keychain -p actions $RUNNER_TEMP/app-signing.keychain-db
          security set-keychain-settings -lut 21600 $RUNNER_TEMP/app-signing.keychain-db
          security unlock-keychain -p actions $RUNNER_TEMP/app-signing.keychain-db
          security default-keychain -s $RUNNER_TEMP/app-signing.keychain-db

          echo "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $RUNNER_TEMP/app-signing.keychain-db

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions $RUNNER_TEMP/app-signing.keychain-db

          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY" | base64 --decode > ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

      - name: Build universal binary
        run: |
          task darwin:build PRODUCTION=true ARCH=amd64 OUTPUT=bin/WindowResizer-amd64
          task darwin:build PRODUCTION=true ARCH=arm64 OUTPUT=bin/WindowResizer-arm64
          lipo -create -output bin/WindowResizer bin/WindowResizer-amd64 bin/WindowResizer-arm64
          rm bin/WindowResizer-amd64 bin/WindowResizer-arm64

      - name: Create .app bundle
        run: task darwin:create:app:bundle

      - name: Sign app
        env:
          SIGNING_IDENTITY: ${{ vars.SIGNING_IDENTITY_DMG }}
        run: |
          codesign --force --deep --sign "${SIGNING_IDENTITY}" \
            --options runtime \
            --timestamp \
            "bin/WindowResizer.app"

          codesign --verify --deep --strict "bin/WindowResizer.app"

      - name: Create DMG
        env:
          SIGNING_IDENTITY: ${{ vars.SIGNING_IDENTITY_DMG }}
        run: |
          brew install create-dmg
          create-dmg \
            --volname "WindowResizer" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 100 \
            --icon "WindowResizer.app" 180 170 \
            --hide-extension "WindowResizer.app" \
            --app-drop-link 480 170 \
            --codesign "${SIGNING_IDENTITY}" \
            "WindowResizer-macos.dmg" \
            "bin/WindowResizer.app"

      - name: Notarize DMG
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          xcrun notarytool submit "WindowResizer-macos.dmg" \
            --key ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            --key-id "${APPLE_API_KEY_ID}" \
            --issuer "${APPLE_API_ISSUER}" \
            --wait

          xcrun stapler staple "WindowResizer-macos.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: WindowResizer-macos
          path: WindowResizer-macos.dmg

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db

  build-windows:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install wails3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install Task
        run: go install github.com/go-task/task/v3/cmd/task@latest

      - name: Build
        run: task windows:build PRODUCTION=true

      - name: Zip executable
        run: Compress-Archive -Path bin/WindowResizer.exe -DestinationPath bin/WindowResizer-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: WindowResizer-windows-amd64
          path: bin/WindowResizer-windows-amd64.zip

  release:
    needs: [check-version, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v${{ needs.check-version.outputs.version }}"
          git tag "${VERSION}"
          git push origin "${VERSION}"
          gh release create "${VERSION}" \
            --title "Release ${VERSION}" \
            --generate-notes \
            artifacts/*
